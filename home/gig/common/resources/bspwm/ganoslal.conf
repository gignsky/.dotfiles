#!/bin/bash
# Ganoslal: 4-monitor desktop configuration (dual-NVIDIA GPUs)
#
# Hardware Layout:
#   Primary NVIDIA RTX 3060 Ti (card1/2d:00.0): DP-1, DP-2, HDMI-0
#   Secondary NVIDIA GTX 970 (card0/23:00.0): HDMI-A-1 (top center)
#
# Physical Monitor Layout:
#   [HDMI-0]    [HDMI-A-1]    [DP-1]      ← Top row (1080p, 1080p, 1080p)
#           [DP-2 - 5120x1440]            ← Bottom row (ultrawide primary)
#
# Desktop Distribution (11 workspaces across 4 monitors):
#   • HDMI-0: V, VI (Top-left 1080p)
#   • DP-1-1: VII, VIII (Top-center 1080p - GTX 970)
#   • DP-1: IX, X (Top-right 1080p)
#   • DP-2: I, II, III, IV (Bottom center ultrawide 5120x1440 - primary)

echo "Loading ganoslal 4-monitor configuration (dual-NVIDIA)..."

# Detect available monitors
AVAILABLE_MONITORS=$(xrandr --listmonitors 2>/dev/null | grep -v "Monitors:" | awk '{print $4}' || true)
echo "Available monitors: $AVAILABLE_MONITORS"

# Configure monitors if they exist
# Top row - left to right
if echo "$AVAILABLE_MONITORS" | grep -q "HDMI-0"; then
  bspc monitor HDMI-0 -d I II
  echo "Configured HDMI-0 (Top-left 1080p) with desktops I, II"
fi

if echo "$AVAILABLE_MONITORS" | grep -q "HDMI-A-1"; then
  bspc monitor HDMI-A-1 -d III IV
  echo "Configured HDMI-A-1 (Top-center 1080p - GTX 970) with desktops III, IV"
fi

if echo "$AVAILABLE_MONITORS" | grep -q "DP-1"; then
  bspc monitor DP-1 -d V VI
  echo "Configured DP-1 (Top-right 1080p) with desktops V, VI"
fi

# Bottom row - center ultrawide (primary)
if echo "$AVAILABLE_MONITORS" | grep -q "DP-2"; then
  bspc monitor DP-2 -d VII VIII IX X XI
  echo "Configured DP-2 (Bottom center ultrawide 5120x1440 - primary) with desktops VII, VIII, IX, X, XI"
fi

# Fallback for any unrecognized monitors
for monitor in $AVAILABLE_MONITORS; do
  if ! bspc query -M --names | grep -q "^$monitor$"; then
    echo "Configuring fallback monitor: $monitor"
    bspc monitor "$monitor" -d "FB$(echo $monitor | tr -d '-')"
  fi
done

CONFIGURED_MONITORS=$(bspc query -M --names | wc -l)
TOTAL_DESKTOPS=$(bspc query -D --names | wc -l)

echo "Ganoslal 4-monitor setup complete:"
echo "  Monitors configured: $CONFIGURED_MONITORS"
echo "  Total desktops: $TOTAL_DESKTOPS"
echo "  Target: 4 monitors, 11 desktops (dual-NVIDIA: RTX 3060 Ti + GTX 970)"
