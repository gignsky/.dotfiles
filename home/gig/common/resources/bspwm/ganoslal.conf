#!/bin/bash
# Ganoslal: 6-monitor desktop configuration (Multi-GPU setup)
#
# Hardware Layout:
#   NVIDIA GPU (card0): Primary rendering + 4 outputs
#   AMD GPU (card1): Secondary + 3 DP + 1 HDMI outputs
#
# Monitor Layout (6-monitor configuration):
#   NVIDIA: HDMI-A-1 (primary), HDMI-A-2, VGA-1, DP-4
#   AMD: DP-1, DP-2, DP-3, HDMI-A-3
#
# Target 6-Monitor Layout:
#   [DP-1] [DP-2] [HDMI-A-1*] ← Top row (AMD + NVIDIA primary)
#   [DP-3] [HDMI-A-2] [HDMI-A-3] ← Bottom row
#
# Desktop Distribution (12 workspaces across 6 monitors):
#   • DP-1: I, II (AMD - Media/Side)
#   • DP-2: III, IV (AMD - Secondary)
#   • HDMI-A-1: V, VI (NVIDIA Primary - Main workspace)
#   • DP-3: VII, VIII (AMD - Development)
#   • HDMI-A-2: IX, X (NVIDIA - Communication)
#   • HDMI-A-3: XI, XII (AMD - Monitoring/Extra)

echo "Loading ganoslal 6-monitor configuration..."

# Detect available monitors
AVAILABLE_MONITORS=$(xrandr --listmonitors | grep -v "Monitors:" | awk '{print $4}')
echo "Available monitors: $AVAILABLE_MONITORS"

# Configure monitors if they exist
if echo "$AVAILABLE_MONITORS" | grep -q "DP-1"; then
    bspc monitor DP-1 -d I II
    echo "Configured DP-1 (AMD) with desktops I, II"
fi

if echo "$AVAILABLE_MONITORS" | grep -q "DP-2"; then
    bspc monitor DP-2 -d III IV  
    echo "Configured DP-2 (AMD) with desktops III, IV"
fi

if echo "$AVAILABLE_MONITORS" | grep -q "HDMI-A-1"; then
    bspc monitor HDMI-A-1 -d V VI
    echo "Configured HDMI-A-1 (NVIDIA Primary) with desktops V, VI"
fi

if echo "$AVAILABLE_MONITORS" | grep -q "DP-3"; then
    bspc monitor DP-3 -d VII VIII
    echo "Configured DP-3 (AMD) with desktops VII, VIII"
fi

if echo "$AVAILABLE_MONITORS" | grep -q "HDMI-A-2"; then
    bspc monitor HDMI-A-2 -d IX X
    echo "Configured HDMI-A-2 (NVIDIA) with desktops IX, X"
fi

if echo "$AVAILABLE_MONITORS" | grep -q "HDMI-A-3"; then
    bspc monitor HDMI-A-3 -d XI XII
    echo "Configured HDMI-A-3 (AMD) with desktops XI, XII"
fi

# Fallback for any unrecognized monitors
for monitor in $AVAILABLE_MONITORS; do
    if ! bspc query -M --names | grep -q "^$monitor$"; then
        echo "Configuring fallback monitor: $monitor"
        bspc monitor "$monitor" -d "FB$(echo $monitor | tr -d '-')"
    fi
done

CONFIGURED_MONITORS=$(bspc query -M --names | wc -l)
TOTAL_DESKTOPS=$(bspc query -D --names | wc -l)

echo "Ganoslal 6-monitor setup complete:"
echo "  Monitors configured: $CONFIGURED_MONITORS"
echo "  Total desktops: $TOTAL_DESKTOPS"
echo "  Multi-GPU support: NVIDIA (primary) + AMD (secondary)"
