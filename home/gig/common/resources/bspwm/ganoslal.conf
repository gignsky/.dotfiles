#!/bin/bash
# Ganoslal: 4-monitor desktop configuration (Multi-GPU setup)
#
# Hardware Layout:
#   NVIDIA GPU (card0): Primary rendering + outputs
#   AMD GPU (card1): Additional outputs (some disconnected)
#
# Monitor Layout (4-monitor configuration):
#   Actual xrandr names: DP-5, HDMI-0, DP-1, DP-3
#
# Physical Layout:
#        [HDMI-0]        ← Top center (NVIDIA)
#   [DP-5*] [DP-1] [DP-3] ← Bottom row (DP-5 primary bottom center)
#
# Desktop Distribution (12 workspaces across 4 monitors):
#   • DP-5: I, II (Primary - Main workspace, bottom center)
#   • HDMI-0: III, IV (Top center)
#   • DP-1: V, VI (Bottom row)
#   • DP-3: VII, VIII (Bottom row)

echo "Loading ganoslal 4-monitor configuration..."

# Detect available monitors
AVAILABLE_MONITORS=$(xrandr --listmonitors | grep -v "Monitors:" | awk '{print $4}')
echo "Available monitors: $AVAILABLE_MONITORS"

# Configure monitors if they exist
if echo "$AVAILABLE_MONITORS" | grep -q "DP-5"; then
    bspc monitor DP-5 -d I II
    echo "Configured DP-5 (Primary bottom center) with desktops I, II"
fi

if echo "$AVAILABLE_MONITORS" | grep -q "HDMI-0"; then
    bspc monitor HDMI-0 -d III IV  
    echo "Configured HDMI-0 (Top center) with desktops III, IV"
fi

if echo "$AVAILABLE_MONITORS" | grep -q "DP-1"; then
    bspc monitor DP-1 -d V VI
    echo "Configured DP-1 (Bottom row) with desktops V, VI"
fi

if echo "$AVAILABLE_MONITORS" | grep -q "DP-3"; then
    bspc monitor DP-3 -d VII VIII
    echo "Configured DP-3 (Bottom row) with desktops VII, VIII"
fi

# Fallback for any unrecognized monitors
for monitor in $AVAILABLE_MONITORS; do
    if ! bspc query -M --names | grep -q "^$monitor$"; then
        echo "Configuring fallback monitor: $monitor"
        bspc monitor "$monitor" -d "FB$(echo $monitor | tr -d '-')"
    fi
done

CONFIGURED_MONITORS=$(bspc query -M --names | wc -l)
TOTAL_DESKTOPS=$(bspc query -D --names | wc -l)

echo "Ganoslal 4-monitor setup complete:"
echo "  Monitors configured: $CONFIGURED_MONITORS"
echo "  Total desktops: $TOTAL_DESKTOPS"
echo "  Multi-GPU support: NVIDIA (primary) + AMD (secondary)"
